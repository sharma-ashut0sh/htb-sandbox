name: CyberActivity Engine

on:
  push:
    branches:
      - main
  workflow_dispatch: 
  schedule:
    - cron: '0 0 * * *' 

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Requirements
        run: pip install requests

      - name: Run CyberActivity Engine
        env:
          HTB_LABS_TOKEN: ${{ secrets.HTB_LABS_TOKEN }}
        run: python3 htb_engine.py

      - name: Commit and Push to Site
        run: |
          git config user.name github-actions[bot]
          git config user.email github-actions[bot]@users.noreply.github.com
          git add index.md
          git diff --quiet && git diff --staged --quiet || git commit -m "Automated metrics update"
          git push
