name: HTB Engine — Auto Sync

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run HTB Engine
        env:
          HTB_LABS_TOKEN:    ${{ secrets.HTB_LABS_TOKEN }}
          HTB_ACADEMY_TOKEN: ${{ secrets.HTB_ACADEMY_TOKEN }}
        run: python htb_engine.py
      - name: Probe team endpoints
        env:
          HTB_LABS_TOKEN: ${{ secrets.HTB_LABS_TOKEN }}
        run: python probe_team.py

      - name: Commit updated data
        run: |
          git config user.name  "htb-engine[bot]"
          git config user.email "htb-engine@noreply"
          git add data.json
          git diff --staged --quiet || git commit -m "chore: auto-sync HTB data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
